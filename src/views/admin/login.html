<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo - Prancheta Tática</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen w-screen flex items-center justify-center relative overflow-hidden">
  
  <!-- Soccer Pitch decorative background -->
  <div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-emerald-500/20 via-slate-950 to-slate-950"></div>
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size: 40px 40px;"></div>

  <!-- Login Card (Glassmorphism) -->
  <div class="w-full max-w-md p-8 bg-slate-900/60 backdrop-blur-md rounded-2xl border border-slate-800 shadow-2xl relative z-10 mx-4">
    <div class="flex flex-col items-center mb-8">
      <div class="bg-emerald-500/20 text-emerald-400 p-3.5 rounded-full border border-emerald-500/30 mb-3 shadow-[0_0_20px_rgba(16,185,129,0.15)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">CMS Administrativo</h2>
      <p class="text-xs text-slate-400 mt-1">Gerencie os elencos e times oficiais</p>
    </div>

    <!-- Error Alert -->
    <div id="error-alert" class="hidden mb-4 p-3 bg-red-950/40 border border-red-500/30 text-red-400 rounded-lg text-xs font-medium text-center"></div>

    <form id="login-form" class="space-y-5">
      <div>
        <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Usuário</label>
        <input type="text" id="username" required placeholder="admin" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-slate-200 transition">
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Senha</label>
        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-slate-200 transition">
      </div>

      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-emerald-900/20 text-sm mt-2 flex items-center justify-center gap-2">
        <span>Acessar Painel</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="/" class="text-xs text-slate-500 hover:text-slate-400 transition">← Voltar para Prancheta Pública</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('error-alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('hidden');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = data.redirect;
        } else {
          alertBox.textContent = data.error || 'Erro de autenticação';
          alertBox.classList.remove('hidden');
        }
      } catch (err) {
        alertBox.textContent = 'Erro ao se conectar ao servidor';
        alertBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
